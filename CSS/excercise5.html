<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Design</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    header {
        position: sticky;
        top: 0;
    }

    .nav {
        background-color: pink;
        height: 83px;
        border: 2px solid black;
    }

    main {
        background-color: black;
        color: white;
        padding: 34px;
    }

    .box {
        padding: 35px 2px;
        margin-top: 5px;
        background-color: green;
        border: 2px solid black;
        text-align: center;
    }

    .box1 {
        border: 2px solid black;
        height: 70vh;
        width: 45%;
        background-color: peachpuff;
        display: inline-block;
        margin: 0 12px;
    }

    .box2 {
        border: 2px solid black;
        height: 70vh;
        width: 45%;
        background-color: lightskyblue;
        display: inline-block;
        margin: 0 12px;
    }

    .container {
        padding: 34px;
        border: 2px solid white;
        margin: 50px 34vw;
        margin-bottom: 15px;
        font-size: 50px;
        border-radius: 15px;
    }

    .orangebox {
        background: orange;
        height: 40px;
        width: 40px;
        position: fixed;
        bottom: 12px;
        right: 23px;
        border-radius: 100px;
    }

    footer {
        border: 2px solid black;
        margin-top: 5px;
        height: 83px;
        background-color: purple;
    }
</style>

<body>
    <header>
        <div class="nav"></div>
    </header>
    <main>
        <div class="box">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>
        <div class="container">
            <p>
                Welcome to css example layout.
            </p>
        </div>
        <div class="orangebox">

        </div>

    </main>
    <footer>

    </footer>

</body>

</html>
