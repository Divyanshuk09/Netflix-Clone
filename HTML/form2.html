<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form2</title>
</head>
<body>
    <form>
        <h2>Job Application</h2>
        <label for="name">Name: </label><br>
        <input type="text" id="name"><br><br>

        <label for="email">Email: </label><br>
        <input type="email" id="email"><br><br>
        
        <label for="phoneNumber">Phone Number: </label><br>
        <input type="tel" id="phoneNumber"><br><br>
        
        <label for="file">Resume: </label>
        <input type="file" name="file" id="file"><br>
        
        <label for="years">Experience(in years):</label>
        <input type="number" id="years" min="0" max="50">

        <fieldset>
            <legend>Skills</legend>
            <label for="cb1">HTML</label>
            <input type="checkbox" name="html" id="cb1">
    
            <label for="cb2">CSS</label>
            <input type="checkbox" name="html" id="cb2">
    
            <label for="cb3">JavaScript</label>
            <input type="checkbox" name="html" id="cb3">
        </fieldset>
        <br>
        <label for="edu">Highest Education:</label>
        <select name="" id=""></select>
        <option value=""></option>
        <input type="date" name="" id="">

    </form>
    
</body>
</html>
