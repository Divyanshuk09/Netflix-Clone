<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table_1</title>
</head>
<body>
    <table border="2">
        <thead>
            <th>Student Id</th>
            <th>Student Name</th>
            <th>Gender</th>
            <th>Age</th>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>A</td>
                <td>M</td>
                <td>18</td>
            </tr>
            <tr>
                <td>2</td>
                <td>B</td>
                <td rowspan="2">F </td>
                <td>19</td>
            </tr>
            <tr>
                <td>3</td>
                <td>C</td>
                <td>18</td>
            </tr>
            <tr>
                <td>4</td>
                <td>D</td>
                <td colspan="2">M</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
