<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <form>
        <h1>Event Registration</h1>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        </br>
        </br>
        <label for="email">Email:</label>
        <input type="text" id="email" name="email">
        </br>
        </br>
        <label for="phone">Phone No:</label>
        <input type="tel" id="phone" name="phone">
        </br>
        </br>
        <label for="occupation">Occupation:</label>
        <select name="occupation" id="occupation">
        <option value="Student">Student</option>
        <option value="Professional">Professional</option>
        <option value="Other">Other</option>
    </select>
    <br>
    <br>
    <fieldset>
        <legend>Topic of Interest</legend>
        <label for="cb1">HTML</label>
        <input type="checkbox" name="html" id="cb1">

        <label for="cb2">CSS</label>
        <input type="checkbox" name="html" id="cb2">

        <label for="cb3">JavaScript</label>
        <input type="checkbox" name="html" id="cb3">
    </fieldset>
    <br>
    <label for="tb">Comments</label>
    <textarea name="tb" id="tb" cols="30" rows="10"></textarea>
    <input type="button" value="Register">
    </form>
</body>

</html>
