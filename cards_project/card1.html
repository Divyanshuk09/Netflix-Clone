<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card1</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .container {
        width: 100vw;
        height: 100vh;
        margin: auto;
        background-color: bisque;
        display: flex;
        flex-direction: column;
        align-items: center;

    }

    .card {
        background-color: white;
        padding: 20px;
        width: 300px;
        height: 500px;
        border-radius: 10px;
        margin: auto;
        gap: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 10px 11px 19px 0px rgb(38, 37, 37);
    }

    img {
        width: 250px;
        border-radius: 10px;
        justify-content: center;
        align-items: center;
        transition: all 0.3s 0s linear;
    }

    h2 {
        font-weight: 800;
        font-size: 1.6rem;
    }

    p {
        font-size: 1.1rem;
    }

    img:hover {
        transform: scale(1.1);

    }
</style>

<body>
    <div class="container">
        <div class="card">
            <img src="qrcode.png" alt="">
            <h2>Improve your frontend skills by building projects</h2>
            <p>scan the QR code to visit frontend mentor and take your coding skills to next level.</p>
        </div>
    </div>

</body>

</html>
