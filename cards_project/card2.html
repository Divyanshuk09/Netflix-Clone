<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card2</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
        width: 100vw;
        height: 100vh;
        margin: auto;
        background-color: bisque;
        display: flex;
        flex-direction: column;
        align-items: center;

    }

    .card {
        background-color: white;
        width: 300px;
        height: 600px;
        border-radius: 20px;
        margin: auto;
        gap: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 10px 11px 19px 0px rgb(38, 37, 37);
    }

    .card img {
        width: 100%;
        height: 30%;
        border-radius: 20px 20px 0px 0px;
    }

    .card h2 {
        font-weight: 1000;
        text-align: center;
        padding: 10px;
    }

    .card p {
        text-align: center;
        padding-left: 20px;
        padding-right: 20px;
    }

    .card .pricebox {
        background-color: rgba(78, 239, 150, 0.786);
        height: 10%;
        width: 80%;
        border-radius: 15px;
        display: flex;
        justify-content: space-around;
        align-items: center;
    }

    .pricebox img {
        height: 3.5rem;
        width: 3.5rem;
    }

    button {
        border: none;
        width: 80%;
        height: 8%;
        border-radius: 15px;
        color: white;
        font-weight: 700;
        background-color: rgb(65, 21, 107);
        box-shadow: 0 45px 65px rgba(0, 0, 0, 0.50), 0 35px 22px rgba(0, 0, 0, 0.16);
        transition: all 0.3s 0s linear;
    }

    #cancelbox {
        color: black;
        text-decoration: none;
        font-weight: 700;
        transition: all 0.3s 0s linear;
    }

    #cancelbox:hover {
        transform: scale(1.1);
    }

    button:hover {
        cursor: pointer;
        transform: scale(1.1);

    }
</style>

<body>
    <div class="container">
        <div class="card">
            <img src="icon.jpg" alt="">
            <div class="textbox">
                <h2>Order Summary</h2>
                <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Minima quas labore modi rerum, laboriosam
                    sequi
                    ullam cumque eaque id! Esse.</p>
            </div>
            <div class="pricebox">
                <img src="music.png" alt="">
                <div class="price">
                    Annual Plan
                    </br>$99.9/year
                </div>
                <a href="#">Cancel</a>
            </div>
            <button>
                Proceed to Pay.
            </button>
            <a id="cancelbox" href="#">Cancel Order</a>


        </div>
    </div>
</body>

</html>
